<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
    <link rel="preload" href="assets/fonts/kumbh-sans-v27-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="assets/fonts/kumbh-sans-v27-latin-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
    <title>Frontend Mentor | E-commerce product page</title>
  </head>

  <body>
    <header class="header">
      <div class="header__left--container">
        <button type="button" class="nav__toggle" id="menuBtn" aria-label="Toggle menu" aria-expanded="false" aria-controls="menuOverlay">
          <span class="nav__toggle--bar"></span>
          <span class="nav__toggle--bar"></span>
          <span class="nav__toggle--bar"></span>
        </button>
        <div class="header__logo--container">
          <a href="#" class="logo">
            <img class="header__logo--image" src="assets/images/icons/logo.svg" alt="" width="65" height="40">
          </a>
        </div>
        <nav class="nav__links" aria-label="Header navigation">
          <ul class="nav__links--group">
            <li><a href="#" class="nav__links--link">Collections</a></li>
            <li><a href="#" class="nav__links--link">Men</a></li>
            <li><a href="#" class="nav__links--link">Women</a></li>
            <li><a href="#" class="nav__links--link">About</a></li>
            <li><a href="#" class="nav__links--link">Contact</a></li>
          </ul>       
        </nav>
      </div>

      <div class="backdrop" id="backdrop" aria-hidden="true"></div>

      <div class="header__right--container">
        <button class="cart__btn" aria-label="Open cart">
          <img class="cart__icon" src="assets/images/icons/icon-cart.svg" alt="" aria-hidden="true">
          <span class="cart__badge hidden">0</span>
        </button>
        <button class="user__avatar--btn" aria-label="Account">
          <img class="user__avatar" src="assets/images/avatar/image-avatar.png" alt="User avatar" width="100" height="100">
        </button>
      </div>

      <div class="cart__modal hidden" role="dialog" aria-label="Shopping cart">
        <p class="cart__modal--title">Cart</p>
        <div class="cart__modal--body"></div>
      </div>
    </header>

    <main>
      <section class="gallery">
        <div class="gallery__main">
          <img class="gallery__active--image" src="assets/images/products/image-product-1.jpg" alt="Product image">
          <button class="gallery__btn--prev">
            <img src="assets/images/icons/icon-previous.svg" alt="">
          </button>
          <button class="gallery__btn--next">
            <img src="assets/images/icons/icon-next.svg" alt="">
          </button>
        </div>
        <ul class="gallery__thumbnails">
          <li>
            <button class="gallery__thumb" data-index="0">
              <img src="assets/images/products/image-product-1-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="gallery__thumb" data-index="1">
              <img src="assets/images/products/image-product-2-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="gallery__thumb" data-index="2">
              <img src="assets/images/products/image-product-3-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="gallery__thumb" data-index="3">
              <img src="assets/images/products/image-product-4-thumbnail.jpg" alt="">
            </button>
          </li>
        </ul>
      </section>

      <section class="product__info">
        <p class="brand">SNEAKER COMPANY</p>
        <h1 class="product__title">Fall Limited Edition Sneakers</h1>
        <p class="description">
          These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.
        </p>
        <div class="pricing">
          <span class="sales__price"> $125.00</span>
          <span class="discount__badge">50%</span>
          <span class="original__price">$250.00</span>
        </div>
        <div class="quantity__cart">
          <div class="stepper">
            <button class="stepper__minus"><img src="assets/images/icons/icon-minus.svg" alt=""></button>
            <span class="stepper__count">0</span>
            <button class="stepper__plus"><img src="assets/images/icons/icon-plus.svg" alt=""></button>
          </div>
          <button><span><img src="assets/images/icons/icon-cart.svg" alt=""></span>Add to cart</button>
        </div>
      </section>
    </main>

    <div class="lightbox hidden">
      <div class="lightbox__inner">
        <button class="lightbox__close">
          <img src="assets/images/icons/icon-close.svg" alt="">
        </button>
        <img class="lightbox__active--image">
        <button class="gallery__btn--prev">
          <img src="assets/images/icons/icon-previous.svg" alt="">
        </button>
        <button class="gallery__btn--next">
          <img src="assets/images/icons/icon-next.svg" alt="">
        </button>
        <ul class="lightbox__thumbnails">
          <li>
            <button class="lightbox__thumb" data-index="0">
              <img src="assets/images/products/image-product-1-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="lightbox__thumb" data-index="1">
              <img src="assets/images/products/image-product-2-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="lightbox__thumb" data-index="2">
              <img src="assets/images/products/image-product-3-thumbnail.jpg" alt="">
            </button>
          </li>
          <li>
            <button class="lightbox__thumb" data-index="3">
              <img src="assets/images/products/image-product-4-thumbnail.jpg" alt="">
            </button>
          </li>
        </ul>
      </div>
    </div>
  </body>
</html>
